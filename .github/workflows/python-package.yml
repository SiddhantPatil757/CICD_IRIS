name : CI_Pipeline

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    build:

        runs-on: ubuntu-latest
        
        steps:
            - name: checkout code
              uses: actions/checkout@v3

            - name: set up python
              uses: actions/setup-python@v4
              with : 
                    python-version: "3.10"

            - name: Install Dependencies
              run: |
                pip install -r requirements.txt
                
            - name: Run Training
              run: |
                python main.py
            
            - name : Run Test
              run: |
                pytest
                    

